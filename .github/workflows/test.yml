name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.8", "3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Headless scan of fixture tree (report + exit code check)
        shell: bash
        run: |
          set +e
          python -m compare_tool tests/fixtures/old tests/fixtures/new --report report.html
          code=$?
          set -e
          test "$code" -eq 1  # fixtures contain real changes -> exit code 1 expected
